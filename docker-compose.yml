services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ticketing-app-image
    container_name: ticketing-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - ticketing-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: ticketing-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - ticketing-network
    depends_on:
      - app

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: ticketing-db
    restart: unless-stopped
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ticket_app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ticketing-network

 # Node / Vite
  vite:
    image: node:22-alpine
    container_name: ticketing-vite
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - ticketing-network

networks:
  ticketing-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
